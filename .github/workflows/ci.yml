name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install development tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes podman ripgrep

      - name: Initialize pinned sources
        run: make init

      - name: Check scaffold
        run: make test

      - name: Prove optimizer candidates
        run: make prove
