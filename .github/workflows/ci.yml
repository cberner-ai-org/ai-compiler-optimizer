name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  bench-redb:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install development tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes just podman

      - name: Benchmark redb
        run: just bench_redb
